<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maxo Plus Billing</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav>

<div class="logo">
<img src="images/maxoplus.png" alt="Maxo Plus">
</div>

<div class="menu-toggle">☰</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="videos.html">Videos</a></li>
<li><a href="bill.html">Billing</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<section class="page-banner">
<h1>Invoice Generator</h1>
<p>Create professional Maxo Plus invoices.</p>
</section>

<section class="contact-form-section">

<h2>Customer Details</h2>

<form id="billForm">

<input
type="text"
id="customerName"
placeholder="Customer Name"
required>

<input
type="text"
id="customerPhone"
placeholder="Phone Number">

<textarea
id="customerAddress"
placeholder="Customer Address"></textarea>
<h2>Products</h2>

<table id="productTable">

<thead>

<tr>
<th>Product</th>
<th>Boxes</th>
<th>Units</th>
<th>Price / Unit</th>
<th>Total Units</th>
<th>Total</th>
<th></th>
</tr>

</thead>

<tbody id="productBody">

</tbody>

</table>

<br>

<button type="button" id="addProduct" class="btn">
+ Add Product
</button>

<hr style="margin:30px 0;">

<h2>Total Amount : ₹ <span id="grandTotal">0</span></h2>

<br>

<button type="button" class="btn">
Generate PDF
</button>
</form>

</section>

<footer>

<h2>MAXO PLUS</h2>

<p>Premium Cleaning Solutions For Every Home</p>

</footer>

<script>

const menuToggle =
document.querySelector(".menu-toggle");

const navLinks =
document.querySelector(".nav-links");

menuToggle.onclick = () => {

navLinks.classList.toggle("active");

menuToggle.innerHTML =
navLinks.classList.contains("active") ? "✕" : "☰";

};

</script>
<script src="js/bill.js"></script>
</body>
</html>
