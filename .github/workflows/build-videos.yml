name: Build Videos JSON

on:
  push:
    paths:
      - 'content/videos/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate videos.json
        run: node scripts/generate-videos.js

      - name: Commit and Push videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if the file actually exists and has changes before tracking
          if [ -f "videos.json" ]; then
            git add videos.json
            git commit -m "Update videos.json [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "videos.json not found. Check your script output path."
            exit 1
          fi
