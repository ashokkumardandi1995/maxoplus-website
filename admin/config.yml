backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "gallery"
    label: "Gallery"
    files:
      - label: "Gallery Settings"
        name: "gallery_settings"
        file: "gallery.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
